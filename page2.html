<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipino Course Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5; /* Light background to make the card pop */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        /* Customizing the Bootstrap Card to match your image */
        .custom-course-card {
            width: 100%;
            max-width: 350px;
            background-color: #e2e4e7; /* Light gray card body */
            border: none;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s ease-in-out;
        }


        .custom-course-card:hover {
            transform: translateY(-5px);
            cursor: pointer;
        }


        .card-header-title {
            font-size: 2.2rem;
            font-weight: 500;
            color: #202124;
            margin-bottom: 0.8rem;
        }


        .card-banner {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 10px;
        }


        .class-year {
            font-weight: 700;
            color: #5f6368;
            margin-top: 1rem;
            margin-bottom: 0;
        }


        .teacher-label {
            color: #70757a;
            margin-top: 2.5rem; /* Large gap before teacher name */
            font-size: 1.1rem;
        }


        /* The dark pill-shaped progress bar */
        .progress-pill {
            height: 14px;
            background-color: #5f6368;
            border-radius: 50px;
            width: 100%;
            margin-top: 1rem;
        }
    </style>
</head>
<body>


    <div class="container d-flex justify-content-center">
        <div class="card custom-course-card">
           
            <h1 class="card-header-title">Filipino</h1>


            <img src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=400"
                 class="img-fluid card-banner" alt="Course Image">


            <div class="card-body p-0">
                <p class="class-year">9-Amethyst 2025-2026</p>
                <p class="teacher-label">Ms. Francisco</p>
               
                <div class="progress-pill"></div>
            </div>


        </div>
    </div>


</body>
</html>
