<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100px;
        margin: 0;
        background-color: #f0f2f5;
    }


    form {
        color: white;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
        width: 350px;
        padding: 40px 20px;
        border-radius: 15px;
        background-color: rgba(0, 0, 0, 0.8);
        text-align: center;
    }


    .input {
        margin-bottom: 15px;
    }


    #message {
        font-size: 12px;
        color: #17a2b8;
        margin-top: 5px;
        min-height: 18px;
    }


    button {
        margin-top: 10px;
    }
</style>
</head>


<body>
    <div class="container d-flex justify-content-center">
        <form>
            <div class="header">
                <h1>Create an account</h1>
            </div>
           
            <div class="input">
                <label for="username">Name</label><br>
                <input type="text" name="username" id="username" placeholder="ohokay" class="form-control mb-2"><br>
               
                <label for="pass">Password</label><br>
                <input type="password" name="pass" id="pw" placeholder="zllaguno12" class="form-control">
            </div>


            <div class="checkbox">
                <input type="checkbox" id="login" onclick="yuh()">
                <label for="login">Stay logged in</label>
                <p id="message"></p>
            </div>




            <button type="button" class="btn btn-info" onclick="window.location.href='page2.html';">Login</button>
            <button type="button" class="btn btn-light" onclick="window.location.reload()">Cancel</button>


            <div class="member mt-3">
                <p>Already a member? <a href="#" class="text-info">Sign In</a></p>
            </div>
        </form>
    </div>


<script>
    function yuh() {
        let staylogin = document.getElementById("login").checked;
        let message = document.getElementById("message");


        switch(staylogin) {
            case true:
                message.innerHTML = "Your session will stay active.";
                break;
            case false:
                message.innerHTML = "";
                break;
        }
    }


    function access() {
        let inputuser = document.getElementById("username").value;
        let inputpass = document.getElementById("pw").value;


        if (inputuser === "ohokay" && inputpass === "zllaguno12") {
            alert("Welcome, ohokay!");
            window.location.href = "dashboard.html";
        } else {
            alert("Incorrect username and/or password.");
        }
    }
</script>
</body>
</html>
